<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="deck-hash" content="">
<title>새 프레젠테이션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="engine.css">
</head>
<body>
<!-- ============================================================
     EDITOR UI — 에디터 모드에서만 표시됨 (E 키로 토글)
     ============================================================ -->
<div class="ed-mode-badge">EDITOR — Ctrl+S:Save &nbsp; E:Exit &nbsp; G:Grid</div>
<div class="ed-file-bar">
  <button class="fb-save" onclick="EA.save()" title="Ctrl+S">Save</button>
  <button onclick="EA.saveAs()" title="저장 위치 선택">Save As</button>
  <button onclick="EA.exportHTML()" title="Ctrl+Shift+S">Export</button>
  <button class="fb-reset" onclick="EA.resetAll()">Reset</button>
  <button class="fb-exit" onclick="EA.toggle()">Edit Mode Out</button>
</div>
<nav class="ed-nav">
  <div class="ed-nav-header"><h3>SLIDES</h3><button class="ed-nav-close" onclick="EA.toggle()">✕</button></div>
  <div class="ed-nav-list" id="edNavList"></div>
  <div class="ed-nav-footer">
    <button class="ed-nav-add" onclick="EA.insertBlankAfter()" title="현재 슬라이드 뒤에 빈 슬라이드 추가">+ 새 슬라이드</button>
  </div>
</nav>
<div class="ed-ctx-menu" id="edCtxMenu"></div>
<aside class="ed-panel" id="edPanel"></aside>

<div class="ed-toolbar" id="edToolbar">
  <div class="ed-toolbar-titlebar" id="edToolbarDrag"><span>TEXT EDITOR</span><div style="display:flex;gap:2px"><button onclick="EA.minimizeToolbar()">−</button><button onclick="EA.closeToolbar()">✕</button></div></div>
  <div class="ed-toolbar-body" id="edToolbarBody">
    <button class="tb" onclick="EA.execCmd('bold')"><b>B</b></button><button class="tb" onclick="EA.execCmd('italic')"><i>I</i></button><div class="sep"></div>
    <button class="tb" onclick="EA.setAlign('left')">◧</button><button class="tb" onclick="EA.setAlign('center')">◫</button><button class="tb" onclick="EA.setAlign('right')">◨</button><div class="sep"></div>
    <button class="tb ed-mode-btn active" id="edSizeBlock" onclick="EA.setSizeMode('block')">블록</button><button class="tb ed-mode-btn" id="edSizeSel" onclick="EA.setSizeMode('sel')">선택</button>
    <select class="ed-size-select" onchange="EA.setSize(this.value)"><option value="">크기</option><option value="0.65rem">XS</option><option value="0.85rem">S</option><option value="1.1rem">M</option><option value="1.5rem">L</option><option value="2rem">XL</option><option value="3rem">2XL</option><option value="5rem">3XL</option></select>
    <input class="ed-custom-size" id="edCustomSize" placeholder="px" onkeydown="if(event.key==='Enter')EA.setSize(this.value)"><div class="sep"></div>
    <div class="ed-spacing-row"><label>행간</label><input class="ed-spacing-input" id="edLineH" placeholder="1.8" onkeydown="if(event.key==='Enter')EA.setLineHeight(this.value)"></div>
    <div class="ed-spacing-row"><label>자간</label><input class="ed-spacing-input" id="edLetterS" placeholder="0" onkeydown="if(event.key==='Enter')EA.setLetterSpacing(this.value)"></div><div class="sep"></div>
    <button class="tb" onclick="EA.zIndex(1)">↑z</button><button class="tb" onclick="EA.zIndex(-1)">↓z</button><div class="sep"></div>
    <button class="tb" onclick="EA.deleteElement()" style="color:#ff5f57">✕</button>
    <div style="width:100%;margin-top:8px">
      <div class="ed-palette-row" id="edPaletteTabs">
        <button class="ed-palette-tab active" data-pal="green" onclick="EA.setPalette('green')">Green</button>
        <button class="ed-palette-tab" data-pal="gold" onclick="EA.setPalette('gold')">Gold</button>
        <button class="ed-palette-tab" data-pal="pink" onclick="EA.setPalette('pink')">Pink</button>
        <button class="ed-palette-tab" data-pal="custom" onclick="EA.setPalette('custom')">Custom</button>
      </div>
      <div class="ed-palette-swatches" id="edSwatches"></div>
      <input type="color" id="edColorPicker" value="#3ECF8E" onchange="EA.setColor(this.value)" style="width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:50%">
      <div class="ed-gradient-bar" id="edGradientBar"></div>
      <div class="ed-palette-actions">
        <button onclick="EA.savePaletteFile()">Save .plt</button>
        <button onclick="EA.loadPaletteFile()">Load .plt</button>
      </div>
    </div>
  </div>
</div>
<div class="ed-toast" id="edToast"></div>
<input type="file" id="edFileImg" accept="image/*" style="display:none">
<input type="file" id="edFileVid" accept="video/*" style="display:none">
<input type="file" id="edFilePlt" accept=".plt,.json" style="display:none">

<!-- ============================================================
     SLIDE CONTENT — 여기에 슬라이드를 작성하세요
     ============================================================ -->
<div class="slide-frame">
<main class="slide-deck" role="region" aria-label="프레젠테이션">

<!-- 슬라이드 1: 제목 -->
<section class="slide">
  <h1 data-step="1"><span class="green">제목을</span> 입력하세요</h1>
  <p data-step="2" class="bottom-comment">// 부제목</p>
</section>

<!-- 슬라이드 2: 본문 -->
<section class="slide">
  <p class="top-label" data-step="1">> 섹션</p>
  <h2 data-step="2">본문 슬라이드</h2>
  <ul data-step="3">
    <li>첫 번째 항목</li>
    <li>두 번째 항목</li>
    <li>세 번째 항목</li>
  </ul>
</section>

</main>
<!-- Editor overlays (inside slide-deck) -->
<div class="ed-guide-169" id="edGuide169"><span class="ed-guide-label">1920 × 1080 (16:9)</span></div>
<div class="ed-crosshair-h"></div><div class="ed-crosshair-v"></div>
<div class="ed-grid" id="edGrid"></div>
<div class="ed-snap-h" id="edSnapH"></div><div class="ed-snap-v" id="edSnapV"></div>
</div><!-- end slide-deck (note: overlays should be inside slide-deck) -->
<nav class="slide-controls"><div class="progress-bar"><div class="progress-fill"></div></div><div class="slide-counter"><span class="current-num">1</span> / <span class="total-num">1</span></div></nav>
<div class="help-hint">← → : slide &nbsp; space : step &nbsp; n : notes &nbsp; f : fullscreen &nbsp; e : editor</div>
</div><!-- end slide-frame -->

<!-- ============================================================
     ENGINES — 순서 중요: presentation → editor
     ============================================================ -->
<script src="presentation.js"></script>
<script src="editor.js"></script>
</body>
</html>
